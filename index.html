<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropEdge V9.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');
:root {
  --bg: #0a0a0f; --card: #12121a; --card-hover: #1a1a25;
  --border: #2a2a3a; --text: #e0e0e0; --text-dim: #8888aa;
  --accent: #6366f1; --accent-glow: rgba(99,102,241,0.15);
  --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
  --tier1: #f59e0b; --tier2: #6366f1; --tier3: #64748b;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(99,102,241,0.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(245,158,11,0.04) 0%,transparent 50%);pointer-events:none;z-index:0}

/* ─── NAV ─── */
#nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:16px;height:52px}
#nav .logo{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--tier1);letter-spacing:2px;white-space:nowrap;margin-right:8px}
#nav .logo span{color:var(--text-dim);font-weight:400}
.season-toggle{display:flex;gap:2px;background:rgba(42,42,58,0.6);border-radius:8px;padding:3px}
.season-btn{padding:4px 12px;border-radius:6px;border:none;cursor:pointer;font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--text-dim);background:transparent;transition:all 0.15s}
.season-btn.active{background:var(--accent);color:#fff}
#nav .spacer{flex:1}
.stats-bar{display:flex;gap:20px;font-size:11px;color:var(--text-dim)}
.stats-bar .sb-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.stats-bar .sb-val{font-family:var(--font-mono);font-weight:700;font-size:13px;color:var(--text)}
.stats-bar .sb-val.green{color:var(--green)}
.stats-bar .sb-val.amber{color:var(--amber)}
#filter-bar{position:sticky;top:52px;z-index:99;background:rgba(10,10,15,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select,input{background:rgba(42,42,58,0.6);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 10px;font-family:var(--font-body);font-size:12px;outline:none;cursor:pointer;transition:border-color 0.15s}
select:hover,input:hover{border-color:var(--accent)}
input{width:140px}
input::placeholder{color:var(--text-dim)}
.tab-row{display:flex;gap:2px;background:rgba(42,42,58,0.4);border-radius:8px;padding:3px;margin-left:auto}
.tab-btn{padding:4px 12px;border-radius:6px;border:none;cursor:pointer;font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--text-dim);background:transparent;transition:all 0.15s}
.tab-btn.active{background:rgba(99,102,241,0.2);color:var(--accent)}

/* ─── MAIN ─── */
#main{padding:16px 20px;position:relative;z-index:1}
#plays-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
#leaderboard-view,#stats-view{display:none}

/* ─── CARDS ─── */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all 0.2s;cursor:pointer;position:relative}
.card:hover{background:var(--card-hover);border-color:rgba(99,102,241,0.35);transform:translateY(-1px);box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.card.lean{border-style:dashed;opacity:0.82}
.card.lean:hover{opacity:1}
.card-head{padding:10px 12px 8px;display:flex;align-items:flex-start;gap:8px}
.tier-badge{font-family:var(--font-mono);font-size:9px;font-weight:700;padding:3px 7px;border-radius:4px;letter-spacing:0.8px;white-space:nowrap;flex-shrink:0}
.tb-t1-ultra{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000;box-shadow:0 0 12px rgba(245,158,11,0.4)}
.tb-t1-premium{background:rgba(245,158,11,0.18);color:#f59e0b;border:1px solid rgba(245,158,11,0.4)}
.tb-t1{background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.25)}
.tb-t2{background:rgba(99,102,241,0.15);color:#a5b4fc;border:1px solid rgba(99,102,241,0.3)}
.tb-t3{background:rgba(100,116,139,0.12);color:#94a3b8;border:1px solid rgba(100,116,139,0.25)}
.tb-t3-lean{background:transparent;color:#64748b;border:1px dashed #334155}
.card-title{flex:1;min-width:0}
.card-player{font-size:14px;font-weight:700;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-match{font-size:11px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.dir-badge{font-family:var(--font-mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;flex-shrink:0}
.dir-over{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3)}
.dir-under{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.dir-lean{background:rgba(100,116,139,0.1);color:#94a3b8;border:1px solid #334155}
.card-nums{display:flex;gap:0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.cnum{flex:1;text-align:center;padding:7px 4px;border-right:1px solid var(--border)}
.cnum:last-child{border-right:none}
.cnum-label{font-size:9px;color:var(--text-dim);letter-spacing:0.5px;text-transform:uppercase}
.cnum-val{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--text);margin-top:1px}
.cnum-val.green{color:var(--green)}
.cnum-val.red{color:var(--red)}
.cnum-val.amber{color:var(--amber)}
.card-flags{display:flex;flex-wrap:wrap;gap:3px;padding:8px 12px}
.flag{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;letter-spacing:0.3px;title:attr(data-name)}
.flag.on{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
.flag.off{background:rgba(239,68,68,0.12);color:#ef4444aa;border:1px solid rgba(239,68,68,0.2)}
.flag-count{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-left:auto;align-self:center;padding-right:4px}
.card-sparkline{padding:4px 12px 8px}
.sparkline-wrap{position:relative;height:36px}
.sparkline-wrap canvas{display:block}
.card-detail{display:none;border-top:1px solid var(--border);padding:10px 12px}
.card.open .card-detail{display:block}
.detail-section{margin-bottom:10px}
.detail-title{font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.h2h-panel{background:rgba(42,42,58,0.35);border-radius:6px;padding:8px 10px;display:grid;grid-template-columns:1fr 1fr;gap:4px 16px}
.h2h-item{display:flex;justify-content:space-between;font-size:12px}
.h2h-item .k{color:var(--text-dim)}
.h2h-item .v{font-family:var(--font-mono);font-weight:700;color:var(--text)}
.v.pos{color:var(--green)}
.v.neg{color:var(--red)}
.line-history{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lh-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.lh-batch{font-size:9px;color:var(--text-dim);font-weight:600}
.lh-val{font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--text)}
.lh-time{font-size:9px;color:var(--text-dim)}
.lh-arrow{color:var(--text-dim);font-size:12px;align-self:center}
.pred-row{display:flex;align-items:center;gap:8px;font-size:12px}
.pred-pts{font-family:var(--font-mono);font-weight:700;font-size:16px;color:var(--accent)}
.pred-gap{color:var(--text-dim)}
.reasoning-text{font-size:12px;line-height:1.6;color:var(--text-dim);background:rgba(42,42,58,0.25);border-radius:6px;padding:8px 10px;border-left:2px solid var(--accent)}
.reasoning-text.post{border-left-color:var(--green)}
.reasoning-text.post-loss{border-left-color:var(--red)}
.loss-type-badge{display:inline-block;font-family:var(--font-mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);margin-top:4px}
.result-badge{font-family:var(--font-mono);font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.rb-win{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3)}
.rb-loss{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.rb-dnp{background:rgba(100,116,139,0.1);color:#94a3b8;border:1px solid #334155}

/* ─── LEADERBOARD ─── */
#leaderboard-view{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.lb-table{width:100%;border-collapse:collapse}
.lb-table th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--border);background:rgba(42,42,58,0.3);cursor:pointer}
.lb-table th:hover{color:var(--text)}
.lb-table td{padding:8px 12px;border-bottom:1px solid rgba(42,42,58,0.5);font-size:13px;transition:background 0.1s}
.lb-table tr:hover td{background:rgba(42,42,58,0.3);cursor:pointer}
.lb-table tr.player-row-expanded td{background:rgba(42,42,58,0.2)}
.lb-player-name{font-weight:600;color:var(--text)}
.lb-team{font-size:11px;color:var(--text-dim);font-family:var(--font-mono)}
.lb-wins{color:var(--green);font-family:var(--font-mono);font-weight:700}
.lb-losses{color:var(--red);font-family:var(--font-mono);font-weight:700}
.lb-hr{font-family:var(--font-mono)}
.lb-delta{font-family:var(--font-mono)}
.mini-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;width:60px;margin-top:2px}
.mini-bar-fill{height:100%;border-radius:2px;background:var(--green);transition:width 0.4s}
.drill-row{background:rgba(18,18,26,0.9)!important}
.drill-table{width:100%;border-collapse:collapse;margin:0}
.drill-table td{padding:5px 12px;font-size:12px;border-bottom:1px solid rgba(42,42,58,0.3);color:var(--text-dim)}
.drill-table tr:last-child td{border-bottom:none}
.drill-dir{font-family:var(--font-mono);font-size:10px;font-weight:700}
.view-all-link{font-size:11px;color:var(--accent);cursor:pointer;text-decoration:underline;padding:6px 12px;display:block}

/* ─── STATS PANEL ─── */
#stats-view{display:none}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.stat-card-title{font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(42,42,58,0.4)}
.stat-row:last-child{border-bottom:none}
.stat-label{font-size:12px;color:var(--text-dim)}
.stat-value{font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--text)}
.stat-value.green{color:var(--green)}
.stat-value.amber{color:var(--amber)}
.stat-bar-wrap{display:flex;align-items:center;gap:6px}
.stat-bar-track{height:4px;width:80px;background:var(--border);border-radius:2px;overflow:hidden}
.stat-bar-track .fill{height:100%;background:var(--accent);border-radius:2px}

/* ─── EMPTY STATE ─── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.3}
.empty-msg{font-size:14px;margin-bottom:6px}
.empty-sub{font-size:12px;opacity:0.6}

/* ─── LOADING ─── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:16px}
.loader-ring{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);letter-spacing:2px}

/* ─── SCROLL TO TOP ─── */
#scroll-top{position:fixed;bottom:20px;right:20px;width:36px;height:36px;background:rgba(42,42,58,0.9);border:1px solid var(--border);border-radius:8px;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;z-index:50;backdrop-filter:blur(8px)}
#scroll-top:hover{background:var(--accent);border-color:var(--accent)}
#scroll-top.show{display:flex}

/* ─── RESPONSIVE ─── */
@media(max-width:640px){
  #plays-grid{grid-template-columns:1fr}
  .stats-bar{display:none}
  #nav{gap:8px}
}
</style>
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <div class="loader-text">LOADING PROPEDGE</div>
</div>

<nav id="nav">
  <div class="logo">PROP<span>EDGE</span> <span style="color:var(--accent)">V9.1</span></div>
  <div class="season-toggle">
    <button class="season-btn" id="btn-today" onclick="setSeason('today')">Today</button>
    <button class="season-btn active" id="btn-2526" onclick="setSeason('2025-26')">25-26</button>
    <button class="season-btn" id="btn-2425" onclick="setSeason('2024-25')">24-25</button>
  </div>
  <div class="spacer"></div>
  <div class="stats-bar" id="global-stats">
    <div class="sb-item"><div class="sb-val" id="sb-plays">—</div><div>Plays</div></div>
    <div class="sb-item"><div class="sb-val green" id="sb-hr">—</div><div>HR%</div></div>
    <div class="sb-item"><div class="sb-val amber" id="sb-t1">—</div><div>T1 HR%</div></div>
    <div class="sb-item"><div class="sb-val" id="sb-roi">—</div><div>Avg Δ</div></div>
  </div>
</nav>

<div id="filter-bar">
  <select id="flt-tier" onchange="applyFilters()">
    <option value="">All Tiers</option>
    <option value="T1_ULTRA">T1 ULTRA</option>
    <option value="T1_PREMIUM">T1 PREMIUM</option>
    <option value="T1">T1</option>
    <option value="T2">T2</option>
    <option value="T3">T3</option>
    <option value="T3_LEAN">T3 LEAN</option>
  </select>
  <select id="flt-dir" onchange="applyFilters()">
    <option value="">All Directions</option>
    <option value="OVER">OVER</option>
    <option value="UNDER">UNDER</option>
    <option value="LEAN">LEAN</option>
  </select>
  <select id="flt-result" onchange="applyFilters()">
    <option value="">All Results</option>
    <option value="WIN">WIN</option>
    <option value="LOSS">LOSS</option>
    <option value="ungraded">Ungraded</option>
  </select>
  <select id="flt-pos" onchange="applyFilters()">
    <option value="">All Positions</option>
    <option value="Guard">Guard</option>
    <option value="Forward">Forward</option>
    <option value="Center">Center</option>
  </select>
  <select id="flt-sort" onchange="applyFilters()">
    <option value="tier">Sort: Tier</option>
    <option value="conf">Sort: Confidence</option>
    <option value="player">Sort: Player</option>
    <option value="date">Sort: Date</option>
    <option value="delta">Sort: Delta</option>
  </select>
  <input type="text" id="flt-search" placeholder="Search player…" oninput="applyFilters()">
  <div class="tab-row">
    <button class="tab-btn active" onclick="setView('plays')">Plays</button>
    <button class="tab-btn" onclick="setView('leaderboard')">Leaderboard</button>
    <button class="tab-btn" onclick="setView('stats')">Stats</button>
  </div>
</div>

<div id="main">
  <div id="plays-grid"></div>
  <div id="leaderboard-view"></div>
  <div id="stats-view"></div>
</div>

<div id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
// ─── DATA ───────────────────────────────────────────────────
let allPlays = [];
let filteredPlays = [];
let currentSeason = '2025-26';
let currentView = 'plays';

const JSON_PATHS = {
  'today':   'data/today.json',
  '2024-25': 'data/season_2024_25.json',
  '2025-26': 'data/season_2025_26.json',
};

async function loadSeason(season) {
  const path = JSON_PATHS[season];
  try {
    const r = await fetch(path + '?t=' + Date.now());
    if (!r.ok) return [];
    return await r.json();
  } catch(e) {
    console.warn('Could not load', path, e);
    return [];
  }
}

async function init() {
  document.getElementById('loading').style.display = 'flex';
  allPlays = await loadSeason(currentSeason);
  document.getElementById('loading').style.display = 'none';
  applyFilters();
  updateGlobalStats(allPlays);
}

// ─── SEASON / VIEW ──────────────────────────────────────────
async function setSeason(s) {
  currentSeason = s;
  ['today','2526','2425'].forEach(id => {
    document.getElementById('btn-'+id).classList.toggle('active', id.replace('-','') === s.replace('-26','526').replace('-25','425').replace('today','today'));
  });
  document.getElementById('btn-today').classList.toggle('active', s==='today');
  document.getElementById('btn-2526').classList.toggle('active', s==='2025-26');
  document.getElementById('btn-2425').classList.toggle('active', s==='2024-25');
  document.getElementById('loading').style.display = 'flex';
  allPlays = await loadSeason(s);
  document.getElementById('loading').style.display = 'none';
  applyFilters();
  updateGlobalStats(allPlays);
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['plays','leaderboard','stats'][i]===v));
  document.getElementById('plays-grid').style.display = v==='plays' ? 'grid' : 'none';
  document.getElementById('leaderboard-view').style.display = v==='leaderboard' ? 'block' : 'none';
  document.getElementById('stats-view').style.display = v==='stats' ? 'block' : 'none';
  if (v==='leaderboard') renderLeaderboard(filteredPlays);
  if (v==='stats') renderStats(filteredPlays);
}

// ─── FILTERS ────────────────────────────────────────────────
function applyFilters() {
  const tier   = document.getElementById('flt-tier').value;
  const dir    = document.getElementById('flt-dir').value;
  const result = document.getElementById('flt-result').value;
  const pos    = document.getElementById('flt-pos').value;
  const sort   = document.getElementById('flt-sort').value;
  const search = document.getElementById('flt-search').value.trim().toLowerCase();

  filteredPlays = allPlays.filter(p => {
    if (tier && p.tierLabel !== tier) return false;
    if (dir) {
      const d = p.dir || '';
      if (dir === 'LEAN' && !d.includes('LEAN')) return false;
      if (dir === 'OVER' && !d.includes('OVER')) return false;
      if (dir === 'UNDER' && !d.includes('UNDER')) return false;
      if (dir === 'OVER' && d.includes('LEAN')) return false;
      if (dir === 'UNDER' && d.includes('LEAN')) return false;
    }
    if (result) {
      if (result === 'ungraded' && p.result) return false;
      if (result !== 'ungraded' && p.result !== result) return false;
    }
    if (pos && p.position !== pos) return false;
    if (search && !(p.player||'').toLowerCase().includes(search) &&
        !(p.match||'').toLowerCase().includes(search)) return false;
    return true;
  });

  filteredPlays.sort((a,b) => {
    if (sort==='tier') {
      const tp = {T1_ULTRA:0,T1_PREMIUM:1,T1:2,T2:3,T3:4,T3_LEAN:5};
      const td = (tp[a.tierLabel]||4) - (tp[b.tierLabel]||4);
      if (td !== 0) return td;
      return (b.conf||0) - (a.conf||0);
    }
    if (sort==='conf') return (b.conf||0) - (a.conf||0);
    if (sort==='player') return (a.player||'').localeCompare(b.player||'');
    if (sort==='date') return (b.date||'').localeCompare(a.date||'');
    if (sort==='delta') return (b.delta||0) - (a.delta||0);
    return 0;
  });

  if (currentView === 'plays') renderPlays(filteredPlays);
  else if (currentView === 'leaderboard') renderLeaderboard(filteredPlays);
  else renderStats(filteredPlays);
  updateGlobalStats(filteredPlays);
}

// ─── GLOBAL STATS ───────────────────────────────────────────
function updateGlobalStats(plays) {
  const graded = plays.filter(p => p.result === 'WIN' || p.result === 'LOSS');
  const wins = graded.filter(p => p.result === 'WIN').length;
  const hr = graded.length ? Math.round(wins/graded.length*100) : 0;
  const t1 = graded.filter(p => p.tier === 1);
  const t1w = t1.filter(p => p.result === 'WIN').length;
  const t1hr = t1.length ? Math.round(t1w/t1.length*100) : 0;
  const deltas = graded.map(p => p.delta||0);
  const avgDelta = deltas.length ? (deltas.reduce((a,b)=>a+b,0)/deltas.length).toFixed(1) : '—';

  document.getElementById('sb-plays').textContent = plays.length.toLocaleString();
  document.getElementById('sb-hr').textContent = graded.length ? hr + '%' : '—';
  document.getElementById('sb-hr').className = 'sb-val ' + (hr >= 60 ? 'green' : hr >= 50 ? 'amber' : '');
  document.getElementById('sb-t1').textContent = t1.length ? t1hr + '%' : '—';
  document.getElementById('sb-roi').textContent = typeof avgDelta === 'string' ? avgDelta : (avgDelta > 0 ? '+' : '') + avgDelta;
}

// ─── FLAG ABBREVS ────────────────────────────────────────────
const FLAG_ABBR = {
  'Volume':'VOL','HR L30':'H30','HR L10':'H10','Trend':'TRD','Context':'CTX',
  'Defense':'DEF','H2H':'H2H','Pace':'PCE','FG Trend':'FGT','Min Trend':'MIN'
};

// ─── SPARKLINE ───────────────────────────────────────────────
function drawSparkline(canvas, scores, line, homes) {
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if (!scores || scores.length < 2) return;

  const max = Math.max(...scores, line + 2) + 1;
  const min = Math.min(...scores, line - 2) - 1;
  const range = max - min || 1;
  const pts = scores.map((v,i) => [i/(scores.length-1)*(W-4)+2, H-(v-min)/range*(H-6)-3]);

  // Line
  const lineY = H - (line-min)/range*(H-6) - 3;
  ctx.strokeStyle = 'rgba(99,102,241,0.4)'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(0,lineY); ctx.lineTo(W,lineY); ctx.stroke(); ctx.setLineDash([]);

  // Area fill
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(99,102,241,0.12)'); grad.addColorStop(1,'rgba(99,102,241,0)');
  ctx.beginPath(); ctx.moveTo(pts[0][0],H);
  pts.forEach(p => ctx.lineTo(p[0],p[1]));
  ctx.lineTo(pts[pts.length-1][0],H); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.strokeStyle = 'rgba(99,102,241,0.7)'; ctx.lineWidth = 1.5; ctx.lineJoin = 'round';
  ctx.beginPath(); pts.forEach((p,i) => i===0?ctx.moveTo(...p):ctx.lineTo(...p)); ctx.stroke();

  // Dots
  pts.forEach((p,i) => {
    const v = scores[i];
    ctx.fillStyle = v > line ? 'rgba(34,197,94,0.8)' : 'rgba(239,68,68,0.8)';
    ctx.beginPath(); ctx.arc(p[0],p[1],2.5,0,Math.PI*2); ctx.fill();
  });
}

// ─── CARD RENDERER ───────────────────────────────────────────
function tierBadgeClass(tl) {
  return {T1_ULTRA:'tb-t1-ultra',T1_PREMIUM:'tb-t1-premium',T1:'tb-t1',T2:'tb-t2',T3:'tb-t3',T3_LEAN:'tb-t3-lean'}[tl] || 'tb-t3';
}

function dirBadgeClass(dir) {
  if (!dir) return 'dir-lean';
  if (dir.includes('LEAN')) return 'dir-lean';
  if (dir.includes('UNDER')) return 'dir-under';
  return 'dir-over';
}

function formatLine(v) { return v != null ? Number(v).toFixed(1) : '—'; }
function formatConf(v) { return v != null ? Math.round(v*100)+'%' : '—'; }

function buildCard(p, idx) {
  const isLean = (p.dir||'').includes('LEAN');
  const tl = p.tierLabel || 'T3';
  const res = p.result;
  const resBadge = res ? `<span class="result-badge ${res==='WIN'?'rb-win':res==='LOSS'?'rb-loss':'rb-dnp'}">${res}</span>` : '';

  // Flags
  const flagHtml = (p.flagDetails||[]).map(f =>
    `<div class="flag ${f.agrees?'on':'off'}" title="${f.name}: ${f.detail}">${FLAG_ABBR[f.name]||f.name.slice(0,3)}</div>`
  ).join('') + `<div class="flag-count">${p.flags||0}/10</div>`;

  // Nums
  const confClass = (p.conf||0) >= 0.65 ? 'amber' : '';
  const volClass = (p.volume||0) > 0 ? 'green' : (p.volume||0) < 0 ? 'red' : '';

  const numsHtml = `
    <div class="cnum"><div class="cnum-label">Line</div><div class="cnum-val">${formatLine(p.line)}</div></div>
    <div class="cnum"><div class="cnum-label">L30</div><div class="cnum-val">${formatLine(p.l30)}</div></div>
    <div class="cnum"><div class="cnum-label">L10</div><div class="cnum-val">${formatLine(p.l10)}</div></div>
    <div class="cnum"><div class="cnum-label">L5</div><div class="cnum-val">${formatLine(p.l5)}</div></div>
    <div class="cnum"><div class="cnum-label">L3</div><div class="cnum-val">${formatLine(p.l3)}</div></div>
    <div class="cnum"><div class="cnum-label">Conf</div><div class="cnum-val ${confClass}">${formatConf(p.conf)}</div></div>
  `;

  // H2H panel
  const h2hHtml = p.h2h ? `
    <div class="detail-section">
      <div class="detail-title">H2H vs ${p.match ? (p.isHome ? p.match.split(' @ ')[0] : p.match.split(' @ ')[1]||'opp') : 'opp'}</div>
      <div class="h2h-panel">
        <div class="h2h-item"><span class="k">Avg pts</span><span class="v">${p.h2h}</span></div>
        <div class="h2h-item"><span class="k">Games</span><span class="v">${p.h2hG||'—'}</span></div>
        <div class="h2h-item"><span class="k">TS dev</span><span class="v ${(p.h2hTsDev||0)>0?'pos':'neg'}">${p.h2hTsDev!=null?(p.h2hTsDev>0?'+':'')+Number(p.h2hTsDev).toFixed(1)+'%':'—'}</span></div>
        <div class="h2h-item"><span class="k">Profile</span><span class="v">${p.h2hProfile||'—'}</span></div>
        <div class="h2h-item"><span class="k">Conf</span><span class="v">${p.h2hConfidence!=null?Math.round(p.h2hConfidence*100)+'%':'—'}</span></div>
      </div>
    </div>` : '';

  // Line history
  let lhHtml = '';
  if (p.lineHistory && p.lineHistory.length > 0) {
    const items = p.lineHistory.map((lh, i) => {
      const arrow = i < p.lineHistory.length-1 ?
        `<div class="lh-arrow">${p.lineHistory[i+1].line > lh.line ? '↑' : p.lineHistory[i+1].line < lh.line ? '↓' : '→'}</div>` : '';
      return `<div class="lh-item">
        <div class="lh-batch">B${lh.batch}</div>
        <div class="lh-val">${formatLine(lh.line)}</div>
        <div class="lh-time">${lh.ts||''}</div>
      </div>${arrow}`;
    }).join('');
    lhHtml = `<div class="detail-section"><div class="detail-title">Line History</div><div class="line-history">${items}</div></div>`;
  }

  // Projection model
  const predHtml = p.predPts ? `
    <div class="detail-section">
      <div class="detail-title">Model Projection</div>
      <div class="pred-row">
        <span class="pred-pts">${Number(p.predPts).toFixed(1)} pts</span>
        <span class="pred-gap">${p.predGap!=null?'gap: '+Number(p.predGap).toFixed(1)+' pts':''}</span>
        ${resBadge}
      </div>
    </div>` : `<div class="detail-section" style="padding-top:2px">${resBadge}</div>`;

  // Pre-match reasoning
  const preReason = p.preMatchReason ? `
    <div class="detail-section">
      <div class="detail-title">Pre-Match Analysis</div>
      <div class="reasoning-text">${escHtml(p.preMatchReason)}</div>
    </div>` : '';

  // Post-match reasoning
  const postClass = p.result==='WIN' ? 'post' : 'post-loss';
  const lossTypeBadge = p.lossType && p.result==='LOSS' ? `<div class="loss-type-badge">${p.lossType}</div>` : '';
  const postReason = p.postMatchReason ? `
    <div class="detail-section">
      <div class="detail-title">Post-Match Analysis</div>
      <div class="reasoning-text ${postClass}">${escHtml(p.postMatchReason)}</div>
      ${lossTypeBadge}
    </div>` : '';

  return `<div class="card${isLean?' lean':''}" data-idx="${idx}" onclick="toggleCard(this)">
    <div class="card-head">
      <div class="tier-badge ${tierBadgeClass(tl)}">${tl}</div>
      <div class="card-title">
        <div class="card-player">${escHtml(p.player||'')}</div>
        <div class="card-match">${escHtml(p.match||'')} · ${p.date||''} ${p.gameTime?'· '+p.gameTime:''}</div>
      </div>
      <div class="dir-badge ${dirBadgeClass(p.dir)}">${p.dir||'—'}</div>
    </div>
    <div class="card-nums">${numsHtml}</div>
    <div class="card-flags">${flagHtml}</div>
    <div class="card-sparkline">
      <div class="sparkline-wrap"><canvas width="316" height="36" data-scores="${escAttr(JSON.stringify(p.recent20||p.recent||[]))}" data-line="${p.line||0}" data-homes="${escAttr(JSON.stringify(p.recent20homes||[]))}"></canvas></div>
    </div>
    <div class="card-detail">
      ${predHtml}
      ${h2hHtml}
      ${lhHtml}
      ${preReason}
      ${postReason}
    </div>
  </div>`;
}

function toggleCard(el) {
  el.classList.toggle('open');
  // Draw sparkline if just opened
  if (el.classList.contains('open')) {
    el.querySelectorAll('canvas[data-scores]').forEach(c => {
      try {
        const scores = JSON.parse(c.dataset.scores);
        const line = parseFloat(c.dataset.line);
        const homes = JSON.parse(c.dataset.homes||'[]');
        drawSparkline(c, scores, line, homes);
      } catch(e){}
    });
  }
}

function renderPlays(plays) {
  const grid = document.getElementById('plays-grid');
  if (!plays.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📊</div><div class="empty-msg">No plays match your filters</div><div class="empty-sub">Try adjusting the filter criteria</div></div>`;
    return;
  }
  grid.innerHTML = plays.map((p,i) => buildCard(p,i)).join('');
  // Draw sparklines for visible cards
  grid.querySelectorAll('canvas[data-scores]').forEach(c => {
    try {
      const scores = JSON.parse(c.dataset.scores);
      const line = parseFloat(c.dataset.line);
      const homes = JSON.parse(c.dataset.homes||'[]');
      drawSparkline(c, scores, line, homes);
    } catch(e){}
  });
}

// ─── LEADERBOARD ─────────────────────────────────────────────
let lbSortCol = 'hr'; let lbSortDir = -1;
let expandedPlayer = null;

function renderLeaderboard(plays) {
  const lb = document.getElementById('leaderboard-view');

  // Aggregate by player
  const pmap = {};
  plays.forEach(p => {
    if (!pmap[p.player]) pmap[p.player] = { name:p.player, team:p.team||'', pos:p.position||'',
      plays:0, wins:0, losses:0, deltas:[], props:[] };
    const m = pmap[p.player];
    m.plays++;
    if (p.result==='WIN') m.wins++;
    if (p.result==='LOSS') m.losses++;
    if (p.delta != null) m.deltas.push(p.delta);
    m.props.push(p);
    if (p.team) m.team = p.team;
  });

  let rows = Object.values(pmap).filter(r => r.plays >= 1);
  rows.forEach(r => {
    const g = r.wins + r.losses;
    r.hr = g ? r.wins/g : 0;
    r.graded = g;
    r.avgDelta = r.deltas.length ? r.deltas.reduce((a,b)=>a+b,0)/r.deltas.length : 0;
    r.props.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  });

  rows.sort((a,b) => {
    const vals = {hr:'hr',plays:'plays',wins:'wins',avgDelta:'avgDelta'};
    const key = vals[lbSortCol] || 'hr';
    return lbSortDir * ((b[key]||0) - (a[key]||0));
  });

  const headers = [
    ['player','Player',1],['pos','Pos',0],['plays','Plays',1],
    ['wins','W',0],['hr','HR%',1],['avgDelta','Avg Δ',1]
  ];

  const thHtml = headers.map(([k,label,s]) =>
    `<th onclick="sortLb('${k}')" style="cursor:${s?'pointer':'default'}">${label}${lbSortCol===k?(lbSortDir<0?' ↓':' ↑'):''}</th>`
  ).join('');

  const rowsHtml = rows.map(r => {
    const hrColor = r.graded ? (r.hr>=0.6?'color:var(--green)':r.hr>=0.5?'color:var(--amber)':'color:var(--red)') : '';
    const dColor  = r.avgDelta > 0 ? 'color:var(--green)' : 'color:var(--red)';
    const isExp = expandedPlayer === r.name;
    return `<tr class="player-row${isExp?' player-row-expanded':''}" onclick="toggleLbDrill('${escAttr(r.name)}',this)">
      <td><div class="lb-player-name">${escHtml(r.name)}</div><div class="lb-team">${r.team||''}</div></td>
      <td style="color:var(--text-dim);font-size:11px">${r.pos||''}</td>
      <td><div style="font-family:var(--font-mono)">${r.plays}</div></td>
      <td><span class="lb-wins">${r.wins}</span><span style="color:var(--text-dim)">/${r.losses}</span></td>
      <td><div style="${hrColor};font-family:var(--font-mono);font-weight:700">${r.graded?Math.round(r.hr*100)+'%':'—'}</div><div class="mini-bar"><div class="mini-bar-fill" style="width:${Math.round(r.hr*100)}%;${r.hr>=0.6?'background:var(--green)':r.hr>=0.5?'background:var(--amber)':'background:var(--red)'}"></div></div></td>
      <td><div style="${dColor};font-family:var(--font-mono)">${r.avgDelta!=null?(r.avgDelta>0?'+':'')+r.avgDelta.toFixed(1):'—'}</div></td>
    </tr>
    ${isExp ? buildDrillRow(r) : ''}`;
  }).join('');

  lb.innerHTML = `<table class="lb-table"><thead><tr>${thHtml}</tr></thead><tbody>${rowsHtml}</tbody></table>`;
}

function sortLb(col) {
  if (lbSortCol === col) lbSortDir *= -1;
  else { lbSortCol = col; lbSortDir = -1; }
  renderLeaderboard(filteredPlays);
}

function toggleLbDrill(player, el) {
  expandedPlayer = expandedPlayer === player ? null : player;
  renderLeaderboard(filteredPlays);
}

function buildDrillRow(r) {
  const recent = r.props.slice(0, 10);
  const rows = recent.map(p => {
    const resC = p.result==='WIN'?'color:var(--green)':p.result==='LOSS'?'color:var(--red)':'color:var(--text-dim)';
    return `<tr>
      <td>${p.date||''}</td>
      <td>${escHtml(p.match||'')}</td>
      <td><span class="drill-dir ${dirBadgeClass(p.dir)}" style="font-size:10px;padding:2px 5px;border-radius:3px">${p.dir||'—'}</span></td>
      <td style="font-family:var(--font-mono)">${formatLine(p.line)}</td>
      <td style="font-family:var(--font-mono)">${p.actualPts!=null?p.actualPts:'—'}</td>
      <td style="${resC};font-family:var(--font-mono);font-weight:700">${p.result||'—'}</td>
      <td style="font-family:var(--font-mono);${p.delta>0?'color:var(--green)':p.delta<0?'color:var(--red)':''}">${p.delta!=null?(p.delta>0?'+':'')+p.delta:'—'}</td>
    </tr>`;
  }).join('');
  const moreLink = r.props.length > 10 ? `<tr><td colspan="7"><span class="view-all-link" onclick="event.stopPropagation();filterByPlayer('${escAttr(r.name)}')">View all ${r.props.length} props →</span></td></tr>` : '';
  return `<tr class="drill-row"><td colspan="6" style="padding:0">
    <table class="drill-table">
      <thead><tr><td>Date</td><td>Match</td><td>Dir</td><td>Line</td><td>Actual</td><td>Result</td><td>Delta</td></tr></thead>
      <tbody>${rows}${moreLink}</tbody>
    </table></td></tr>`;
}

function filterByPlayer(player) {
  document.getElementById('flt-search').value = player;
  setView('plays');
  applyFilters();
}

// ─── STATS VIEW ──────────────────────────────────────────────
function renderStats(plays) {
  const sv = document.getElementById('stats-view');
  const graded = plays.filter(p => p.result==='WIN'||p.result==='LOSS');
  const wins = graded.filter(p => p.result==='WIN');

  function hrStr(g, w) {
    if (!g.length) return '—';
    return Math.round(w.length/g.length*100)+'% ('+g.length+')';
  }
  function hrClass(g, w) {
    if (!g.length) return '';
    const r = w.length/g.length;
    return r >= 0.6 ? 'green' : r >= 0.5 ? 'amber' : '';
  }

  // By tier
  const tiers = ['T1_ULTRA','T1_PREMIUM','T1','T2','T3','T3_LEAN'];
  const tierRows = tiers.map(t => {
    const tg = graded.filter(p => p.tierLabel===t);
    const tw = tg.filter(p => p.result==='WIN');
    return `<div class="stat-row"><span class="stat-label">${t}</span><span class="stat-value ${hrClass(tg,tw)}">${hrStr(tg,tw)}</span></div>`;
  }).join('');

  // By direction
  const dirs = ['OVER','UNDER','LEAN OVER','LEAN UNDER'];
  const dirRows = dirs.map(d => {
    const dg = graded.filter(p => p.dir===d);
    const dw = dg.filter(p => p.result==='WIN');
    return `<div class="stat-row"><span class="stat-label">${d}</span><span class="stat-value ${hrClass(dg,dw)}">${hrStr(dg,dw)}</span></div>`;
  }).join('');

  // By position
  const posRows = ['Guard','Forward','Center'].map(pos => {
    const pg = graded.filter(p => p.position===pos);
    const pw = pg.filter(p => p.result==='WIN');
    return `<div class="stat-row"><span class="stat-label">${pos}</span><span class="stat-value ${hrClass(pg,pw)}">${hrStr(pg,pw)}</span></div>`;
  }).join('');

  // Monthly breakdown
  const months = {};
  graded.forEach(p => {
    const m = (p.date||'').slice(0,7);
    if (!months[m]) months[m] = {g:[],w:[]};
    months[m].g.push(p);
    if (p.result==='WIN') months[m].w.push(p);
  });
  const monthRows = Object.entries(months).sort((a,b) => b[0].localeCompare(a[0])).slice(0,6).map(([m,d]) =>
    `<div class="stat-row"><span class="stat-label">${m}</span><span class="stat-value ${hrClass(d.g,d.w)}">${hrStr(d.g,d.w)}</span></div>`
  ).join('');

  // Loss types
  const lossTypes = {};
  graded.filter(p => p.result==='LOSS' && p.lossType).forEach(p => {
    lossTypes[p.lossType] = (lossTypes[p.lossType]||0)+1;
  });
  const lossRows = Object.entries(lossTypes).sort((a,b) => b[1]-a[1]).map(([t,c]) =>
    `<div class="stat-row"><span class="stat-label">${t}</span><span class="stat-value">${c}</span></div>`
  ).join('');

  // Overall summary
  const allDelta = graded.map(p => p.delta||0);
  const avgDelta = allDelta.length ? (allDelta.reduce((a,b)=>a+b,0)/allDelta.length).toFixed(2) : '—';
  const overallHr = graded.length ? Math.round(wins.length/graded.length*100)+'%' : '—';

  sv.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-title">Overall</div>
        <div class="stat-row"><span class="stat-label">Total plays</span><span class="stat-value">${plays.length}</span></div>
        <div class="stat-row"><span class="stat-label">Graded</span><span class="stat-value">${graded.length}</span></div>
        <div class="stat-row"><span class="stat-label">Hit rate</span><span class="stat-value ${graded.length&&wins.length/graded.length>=0.6?'green':''}">${overallHr}</span></div>
        <div class="stat-row"><span class="stat-label">Wins</span><span class="stat-value green">${wins.length}</span></div>
        <div class="stat-row"><span class="stat-label">Losses</span><span class="stat-value">${graded.length-wins.length}</span></div>
        <div class="stat-row"><span class="stat-label">Avg Δ</span><span class="stat-value ${parseFloat(avgDelta)>0?'green':''}">${typeof avgDelta==='string'?avgDelta:(avgDelta>0?'+':'')+avgDelta}</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-title">By Tier</div>
        ${tierRows}
      </div>
      <div class="stat-card">
        <div class="stat-card-title">By Direction</div>
        ${dirRows}
      </div>
      <div class="stat-card">
        <div class="stat-card-title">By Position</div>
        ${posRows}
      </div>
      <div class="stat-card">
        <div class="stat-card-title">Monthly Breakdown</div>
        ${monthRows || '<div class="stat-row"><span class="stat-label" style="color:var(--text-dim)">No graded plays</span></div>'}
      </div>
      ${lossRows ? `<div class="stat-card"><div class="stat-card-title">Loss Classifications</div>${lossRows}</div>` : ''}
    </div>`;
}

// ─── UTILS ───────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Scroll to top
window.addEventListener('scroll', () => {
  document.getElementById('scroll-top').classList.toggle('show', window.scrollY > 400);
});

// ─── BOOT ────────────────────────────────────────────────────
init();
</script>
